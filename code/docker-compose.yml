services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "port=5433"]
    environment:
      POSTGRES_DB: novelscript
      POSTGRES_USER: novelscript
      POSTGRES_PASSWORD: novelscript
    ports:
      - "5433:5433"
    volumes:
      - novelscript_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelscript -d novelscript -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql+psycopg://novelscript:novelscript@postgres:5433/novelscript"
      STORAGE_ROOT: /app/storage
      LOCAL_DEVELOPER_LOGS_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
    environment:
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      STORAGE_ROOT: /app/storage
      LOCAL_DEVELOPER_LOGS_ENABLED: "false"
    command: ["pytest", "tests", "-q"]

  frontend-test:
    profiles: ["test"]
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "http://backend:8000"
    command: ["npm", "test"]

  frontend-build:
    profiles: ["test"]
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "http://backend:8000"
    command: ["npm", "run", "build"]

volumes:
  novelscript_postgres_data:
